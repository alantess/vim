# ~/.tmux.conf

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10                        # faster key response (nvim)
set -g focus-events on
set -g base-index 1                           # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on                    # renumber when a window closes
set -g set-clipboard on
set -g display-time 2000
setw -g mode-keys vi                          # vi keys in copy mode

# ---------------------------------------------------------------------------
# Prefix: Ctrl-a (in addition to default Ctrl-b)
# ---------------------------------------------------------------------------
set -g prefix C-a
bind C-a send-prefix
unbind C-b

# ---------------------------------------------------------------------------
# Key bindings
# ---------------------------------------------------------------------------
# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Split panes (keep current path)
#   v = vertical split   (panes side by side, like :vsplit)
#   s = horizontal split (panes stacked,     like :split)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
unbind '|'
unbind -

# Session tree / switcher
bind S choose-tree -Zs

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + H/J/K/L (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching (prefix + n/p, repeatable)
bind -r n next-window
bind -r p previous-window

# Seamless nvim <-> tmux pane navigation with Ctrl-h/j/k/l (no prefix).
# Handled by vim-tmux-navigator; these are the standard bindings so that
# Ctrl-h/j/k/l move between tmux panes when not inside vim.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Copy-mode (vi): v to select, y to yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Plugins (TPM) — install with prefix + I
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'   # seamless nvim<->tmux nav
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto save/restore
set -g @plugin 'catppuccin/tmux'                  # theme (matches neovim)

# Continuum: auto-restore on start, save every 15 min
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Catppuccin theme (v2 syntax)
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_status_background 'default'

# ---------------------------------------------------------------------------
# Status line layout
# ---------------------------------------------------------------------------
set -g status-position top
set -g status-interval 5
set -g status-justify left

# Pane borders
set -g pane-border-lines heavy
setw -g window-status-separator ""

# ---------------------------------------------------------------------------
# Bootstrap TPM automatically on first launch
# ---------------------------------------------------------------------------
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Keep this line at the very bottom of the file
run '~/.tmux/plugins/tpm/tpm'

# ---------------------------------------------------------------------------
# Catppuccin status modules (must come AFTER the plugin is sourced by TPM)
# ---------------------------------------------------------------------------
set -g status-left ""
set -ga status-left "#{E:@catppuccin_status_session}"
set -g status-right ""
set -ga status-right "#{E:@catppuccin_status_application}"
set -ga status-right "#{E:@catppuccin_status_host}"
